<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISI — AI Marketing Strategy Sprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --charcoal: #1a1a1a;
    --charcoal-mid: #2d2d2d;
    --charcoal-soft: #3d3d3d;
    --teal: #1a5f7a;
    --teal-dark: #134a61;
    --teal-light: #2478a0;
    --teal-muted: #e8f4f9;
    --lime: #3dce6a;
    --lime-subtle: #f0faf3;
    --off-white: #f8f7f4;
    --warm-gray: #f2f0ec;
    --mid-gray: #e5e2dc;
    --text-body: #3a3a3a;
    --text-muted: #6a6a6a;
    --text-light: #9a9a9a;
    --white: #ffffff;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 6px 24px rgba(0,0,0,0.08);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.1);
    --radius: 10px;
    --radius-lg: 16px;
    --max-w: 1100px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text-body);
    background: var(--off-white);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4 {
    font-family: 'Inter', sans-serif;
    line-height: 1.2;
    color: var(--charcoal);
  }

  .container {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 40px;
  }

  /* ─── NAV ─── */
  nav {
    background: var(--white);
    border-bottom: 1px solid var(--mid-gray);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 40px;
  }
  .nav-inner {
    max-width: var(--max-w);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .nav-logo img {
    height: 34px;
    width: auto;
    flex-shrink: 0;
    display: block;
  }
  .footer-logo-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--white);
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 12px;
  }
  .footer-brand img {
    height: 30px;
    width: auto;
    display: block;
  }
  .nav-divider {
    width: 1px;
    height: 28px;
    background: var(--mid-gray);
  }
  .nav-descriptor {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    max-width: 220px;
    line-height: 1.4;
  }
  .nav-cta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* ─── BUTTONS ─── */
  .btn-primary {
    background: var(--teal);
    color: var(--white);
    border: none;
    padding: 14px 28px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { background: var(--teal-dark); transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--teal);
    border: 1.5px solid var(--teal);
    padding: 13px 26px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
  }
  .btn-outline:hover { background: var(--teal); color: var(--white); }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--mid-gray);
    padding: 13px 26px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--teal); color: var(--teal); }

  .btn-lg { padding: 17px 34px; font-size: 15px; }
  .btn-sm { padding: 10px 20px; font-size: 13px; }

  /* ─── HERO ─── */
  .hero {
    background: var(--charcoal);
    padding: 96px 40px 80px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -120px; right: -80px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(26,95,122,0.35) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: 10%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(61,206,106,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: var(--max-w);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(61,206,106,0.12);
    border: 1px solid rgba(61,206,106,0.25);
    color: var(--lime);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 28px;
  }
  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--lime);
    border-radius: 50%;
  }
  .hero h1 {
    color: var(--white);
    font-size: clamp(26px, 3.2vw, 40px);
    font-weight: 800;
    line-height: 1.18;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--lime);
  }
  .hero-sub {
    color: rgba(255,255,255,0.72);
    font-size: 15.5px;
    line-height: 1.75;
    margin-bottom: 36px;
    font-weight: 300;
  }
  .hero-bullets {
    list-style: none;
    margin-bottom: 40px;
  }
  .hero-bullets li {
    color: rgba(255,255,255,0.6);
    font-size: 13.5px;
    padding: 7px 0 7px 22px;
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .hero-bullets li:last-child { border-bottom: none; }
  .hero-bullets li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--lime);
    font-size: 12px;
  }
  .hero-cta { display: flex; gap: 14px; flex-wrap: wrap; }

  /* Hero visual */
  .hero-visual {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-lg);
    padding: 32px;
    backdrop-filter: blur(8px);
  }
  .vis-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 20px;
  }
  .vis-block {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .vis-block.active {
    background: rgba(26,95,122,0.3);
    border-color: rgba(36,120,160,0.5);
  }
  .vis-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .vis-dot.green { background: var(--lime); }
  .vis-dot.teal { background: var(--teal-light); }
  .vis-text {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }
  .vis-text strong {
    color: rgba(255,255,255,0.85);
    font-weight: 500;
    display: block;
    font-size: 13.5px;
    margin-bottom: 2px;
  }
  .vis-arrow {
    text-align: center;
    color: var(--lime);
    font-size: 18px;
    margin: 8px 0;
    opacity: 0.7;
  }
  .vis-result {
    background: linear-gradient(135deg, rgba(26,95,122,0.4), rgba(36,120,160,0.2));
    border: 1px solid rgba(36,120,160,0.4);
    border-radius: 8px;
    padding: 16px;
    margin-top: 12px;
  }
  .vis-result-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal-light);
    margin-bottom: 8px;
  }
  .vis-result-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .vis-tag {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  /* ─── SECTION GENERIC ─── */
  section { padding: 88px 40px; }
  section.alt { background: var(--warm-gray); }
  section.dark { background: var(--charcoal); }
  section.white { background: var(--white); }

  .section-inner { max-width: var(--max-w); margin: 0 auto; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 14px;
  }
  .section-label.light { color: rgba(36,120,160,0.8); }

  .section-headline {
    font-size: clamp(22px, 2.8vw, 34px);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    max-width: 680px;
  }
  .section-headline.centered { text-align: center; max-width: 100%; }
  .section-headline.white { color: var(--white); }

  .section-body {
    font-size: 15.5px;
    color: var(--text-muted);
    line-height: 1.78;
    max-width: 640px;
  }
  .section-body.centered { text-align: center; max-width: 680px; margin: 0 auto; }

  .mid-cta { text-align: center; margin-top: 48px; }

  /* ─── PROBLEM ─── */
  .problem-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    margin-top: 56px;
    align-items: start;
  }
  .pain-list {
    list-style: none;
  }
  .pain-list li {
    padding: 14px 0;
    border-bottom: 1px solid var(--mid-gray);
    font-size: 15px;
    color: var(--text-body);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .pain-list li:last-child { border-bottom: none; }
  .pain-icon {
    width: 20px; height: 20px;
    background: #fee2e2;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 2px;
    color: #dc2626;
  }
  .gap-list {
    background: var(--white);
    border: 1px solid var(--mid-gray);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow-sm);
  }
  .gap-list h4 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 18px;
  }
  .gap-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--mid-gray);
    font-size: 14.5px;
    color: var(--text-body);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .gap-item:last-child { border-bottom: none; }
  .gap-item::before {
    content: '?';
    width: 20px; height: 20px;
    background: var(--teal-muted);
    color: var(--teal);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .warning-box {
    background: #fffbf0;
    border: 1px solid #f5d97a;
    border-left: 4px solid #e6a817;
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-top: 40px;
    font-size: 14.5px;
    color: #7a5a00;
    line-height: 1.65;
  }

  /* ─── REFRAME ─── */
  .reframe-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    margin-top: 48px;
  }
  .reframe-card {
    background: var(--white);
    border: 1px solid var(--mid-gray);
    border-radius: var(--radius-lg);
    padding: 32px;
    box-shadow: var(--shadow-sm);
  }
  .reframe-card h4 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .reframe-card h4.red { color: #dc2626; }
  .reframe-card h4.teal { color: var(--teal); }
  .reframe-list {
    list-style: none;
  }
  .reframe-list li {
    font-size: 14.5px;
    padding: 10px 0;
    border-bottom: 1px solid var(--mid-gray);
    color: var(--text-body);
    padding-left: 18px;
    position: relative;
  }
  .reframe-list li:last-child { border-bottom: none; }
  .reframe-list li::before {
    content: '×';
    position: absolute; left: 0;
    color: #dc2626;
  }
  .reframe-list.good li::before {
    content: '✓';
    color: var(--lime);
  }
  .punch-line {
    background: var(--charcoal);
    color: var(--white);
    border-radius: var(--radius-lg);
    padding: 32px 40px;
    margin-top: 40px;
    font-size: 17px;
    line-height: 1.65;
    position: relative;
  }
  .punch-line::before {
    content: '"';
    font-size: 80px;
    font-family: 'Inter', sans-serif;
    color: rgba(255,255,255,0.07);
    position: absolute;
    top: -10px; left: 24px;
    line-height: 1;
  }

  /* ─── INTRODUCE MISI ─── */
  .misi-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 72px;
    align-items: center;
    margin-top: 48px;
  }
  .misi-check-list {
    list-style: none;
  }
  .misi-check-list li {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 13px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 14.5px;
    color: rgba(255,255,255,0.75);
  }
  .misi-check-list li:last-child { border-bottom: none; }
  .check-icon {
    width: 22px; height: 22px;
    background: rgba(61,206,106,0.15);
    border: 1px solid rgba(61,206,106,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--lime);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .brand-promise {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    font-style: italic;
  }
  .brand-promise strong {
    color: rgba(255,255,255,0.85);
    font-style: normal;
    font-weight: 600;
  }
  .misi-sidebar {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-lg);
    padding: 32px;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 20px;
  }
  .owner-check {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    align-items: flex-start;
  }
  .owner-check:last-child { border-bottom: none; }
  .owner-check .dot {
    width: 6px; height: 6px;
    background: var(--teal-light);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* ─── OFFER EXPLANATION ─── */
  .offer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    margin-top: 48px;
    align-items: start;
  }
  .not-buying {
    list-style: none;
  }
  .not-buying li {
    font-size: 15px;
    padding: 12px 0;
    border-bottom: 1px solid var(--mid-gray);
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: #dc2626;
    padding-left: 18px;
    position: relative;
  }
  .not-buying li:last-child { border-bottom: none; }
  .buying-card {
    background: var(--charcoal);
    color: var(--white);
    border-radius: var(--radius-lg);
    padding: 32px;
  }
  .buying-card h4 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--lime);
    margin-bottom: 20px;
  }
  .buying-list {
    list-style: none;
  }
  .buying-list li {
    font-size: 15px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .buying-list li:last-child { border-bottom: none; }
  .buying-list li::before {
    content: '→';
    color: var(--lime);
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .offer-closing {
    grid-column: 1 / -1;
    background: var(--teal-muted);
    border: 1px solid rgba(26,95,122,0.2);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    font-size: 15px;
    color: var(--teal-dark);
    line-height: 1.7;
    border-left: 4px solid var(--teal);
  }

  /* ─── DELIVERABLES ─── */
  .deliverables-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-top: 48px;
  }
  .deliverable-card {
    background: var(--white);
    border: 1px solid var(--mid-gray);
    border-radius: var(--radius-lg);
    padding: 32px;
    box-shadow: var(--shadow-sm);
  }
  .deliverable-card.featured {
    border-color: rgba(26,95,122,0.3);
    border-top: 3px solid var(--teal);
  }
  .card-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .card-badge.basic {
    background: var(--warm-gray);
    color: var(--text-muted);
    border: 1px solid var(--mid-gray);
  }
  .card-badge.plus {
    background: var(--teal-muted);
    color: var(--teal);
    border: 1px solid rgba(26,95,122,0.2);
  }
  .deliverable-card h3 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .deliverable-card .duration {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .deliverable-list {
    list-style: none;
  }
  .deliverable-list li {
    font-size: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--mid-gray);
    color: var(--text-body);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .deliverable-list li:last-child { border-bottom: none; }
  .d-check {
    width: 18px; height: 18px;
    background: var(--teal-muted);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--teal);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .d-check.lime-bg {
    background: var(--lime-subtle);
    color: #16a34a;
  }

  /* ─── PRICING ─── */
  .cost-concern {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin: 40px 0 56px;
  }
  .cost-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 18px;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    line-height: 1.55;
  }
  .pricing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-bottom: 32px;
  }
